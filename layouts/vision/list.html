{{- define "main" -}}
<header class="page-header vision-header">
    <h1 style="font-family: system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 2.2rem;">{{
        .Title }}</h1>
    {{- if .Content }}
    <div class="vision-intro"
        style="font-family: var(--font-body); font-weight: 400; max-width: 600px; margin: 1rem auto 3rem; color: var(--secondary);">
        {{ .Content }}
    </div>
    {{- end }}
</header>

<div class="elegant-list">
    {{- range where site.RegularPages "Section" "blog" }}
    {{- if in .Params.series "Blue Sky Visions" }}
    <a class="elegant-entry" href="{{ .RelPermalink }}">
        <div class="elegant-date">{{ .Date.Format "Jan 2, 2006" }}</div>
        <div class="elegant-title">{{ .Title }}</div>
    </a>
    {{- end }}
    {{- end }}
</div>
{{- end -}}
