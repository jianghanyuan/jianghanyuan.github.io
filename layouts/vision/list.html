{{- define "main" -}}
<header class="page-header vision-header">
    <h1
        style="font-family: system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 2.8rem; letter-spacing: -0.02em; margin-bottom: 0;">
        {{
        .Title }}</h1>
    {{- if .Content }}
    <div class="vision-intro"
        style="font-family: system-ui, -apple-system, sans-serif; font-weight: 400; font-size: 1rem; text-align: left; line-height: 1.6; margin: 1rem 0 2rem; color: var(--secondary); text-decoration: none;">
        {{ .Content | markdownify }}
    </div>
    {{- end }}
</header>

<div class="elegant-list">
    {{- range where site.RegularPages "Section" "blog" }}
    {{- if in .Params.series "Blue Sky Visions" }}
    <a class="elegant-entry" href="{{ .RelPermalink }}">
        <div class="elegant-date">{{ .Date.Format "Jan 2, 2006" }}</div>
        <div class="elegant-title">{{ .Title }}</div>
    </a>
    {{- end }}
    {{- end }}
</div>
{{- end -}}
