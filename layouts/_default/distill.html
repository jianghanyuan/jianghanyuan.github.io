{{- define "main" -}}
<dt-article>
  <h1>{{ .Title }}</h1>
  {{- if .Description -}}<p>{{ .Description }}</p>{{- end -}}
  {{ .Content }}
</dt-article>

<dt-appendix>
  {{ with .Resources.GetMatch (default "references.bib" .Params.bibliography) }}
  <script type="text/bibliography">
{{ .Content | safeHTML }}
  </script>
  {{ end }}
</dt-appendix>
{{- end -}}
