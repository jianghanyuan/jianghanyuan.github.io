{{- with site.Params.homeInfoParams }}
<section class="home-hero fade-in">
  <h1>{{ .Title | markdownify }}</h1>
  <p>{{ .Content | markdownify }}</p>
  <footer class="hero-social">
    {{ partial "social_icons.html" (dict "align" site.Params.homeInfoParams.AlignSocialIconsTo) }}
  </footer>

  <div class="featured-pills stagger-1" style="justify-content: flex-start; margin-top: 0.5rem;">
    <a href="/blog/research-interests/" class="pill-btn">
      <span class="pill-icon">🔬</span>
      <span class="pill-text">Research Interest</span>
    </a>
    <a href="/vision/" class="pill-btn">
      <span class="pill-icon">✨</span>
      <span class="pill-text">Blue Sky Vision</span>
    </a>
  </div>
</section>
{{- end -}}
