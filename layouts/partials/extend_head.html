<link rel="icon" type="image/png" href="/favicon.png" />
<link rel="apple-touch-icon" href="/favicon.png" />
<link rel="stylesheet" href="/css/custom.css" />

{{ if .Params.distill }}
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
    }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script src="https://distill.pub/template.v1.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    /* ── Clean up Distill chrome — aggressively ── */
    var cleanupDistillChrome = function () {
      // Hide all distill visual elements
      document.querySelectorAll("dt-banner, dt-header, dt-footer, dt-byline, dt-banner *, dt-header *, dt-footer *").forEach(function (el) {
        el.style.cssText = 'display:none!important;visibility:hidden!important;height:0!important;width:0!important;position:absolute!important;overflow:hidden!important;opacity:0!important;';
      });
      // Remove distill-injected favicon links (they override our favicon)
      document.querySelectorAll('link[rel="icon"][href*="distill"], link[rel="shortcut icon"][href*="distill"]').forEach(function (el) {
        el.remove();
      });
      // Also remove any favicon links that don't point to our own
      document.querySelectorAll('link[rel="icon"], link[rel="shortcut icon"]').forEach(function (el) {
        if (el.href && !el.href.includes('/favicon.png')) {
          el.remove();
        }
      });
    };
    cleanupDistillChrome();
    if (document.body) {
      new MutationObserver(function (mutations) {
        cleanupDistillChrome();
      }).observe(document.body, { childList: true, subtree: true });
      // Also observe head for favicon injection
      new MutationObserver(function (mutations) {
        cleanupDistillChrome();
      }).observe(document.head, { childList: true, subtree: true });
    }

    /* ── TOC toggle ── */
    var toc = document.getElementById('distillToc');
    var closeBtn = document.getElementById('tocCloseBtn');
    var openBtn = document.getElementById('tocOpenBtn');

    if (closeBtn && toc) {
      closeBtn.addEventListener('click', function () {
        toc.classList.add('collapsed');
        if (openBtn) openBtn.classList.add('visible');
      });
    }

    if (openBtn && toc) {
      openBtn.addEventListener('click', function () {
        toc.classList.remove('collapsed');
        openBtn.classList.remove('visible');
      });
    }

    /* ── Footnote popups ── */
    var fnRefs = document.querySelectorAll('.footnote-ref');
    var activePopup = null;

    fnRefs.forEach(function (ref) {
      var popupEl = ref.querySelector('.footnote-popup');
      if (!popupEl) return;

      ref.addEventListener('mouseenter', function () {
        if (activePopup && activePopup !== popupEl) {
          activePopup.classList.remove('show');
        }
        popupEl.classList.add('show');
        activePopup = popupEl;

        // Reposition if off-screen
        var rect = popupEl.getBoundingClientRect();
        if (rect.left < 8) {
          popupEl.style.left = '0';
          popupEl.style.transform = 'none';
        } else if (rect.right > window.innerWidth - 8) {
          popupEl.style.left = 'auto';
          popupEl.style.right = '0';
          popupEl.style.transform = 'none';
        }
      });

      ref.addEventListener('mouseleave', function () {
        popupEl.classList.remove('show');
        if (activePopup === popupEl) activePopup = null;
      });

      ref.addEventListener('click', function (e) {
        e.preventDefault();
        if (popupEl.classList.contains('show')) {
          popupEl.classList.remove('show');
          activePopup = null;
        } else {
          if (activePopup) activePopup.classList.remove('show');
          popupEl.classList.add('show');
          activePopup = popupEl;
        }
      });
    });

    // Close popup on click outside
    document.addEventListener('click', function (e) {
      if (activePopup && !e.target.closest('.footnote-ref')) {
        activePopup.classList.remove('show');
        activePopup = null;
      }
    });
  });
</script>
<link rel="stylesheet" href="/css/distill.css" />
{{ end }}
