<link rel="stylesheet" href="/css/custom.css" />
{{ if .Params.distill }}
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
    }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script src="https://distill.pub/template.v1.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    var cleanupDistillChrome = function () {
      document.querySelectorAll("dt-banner, dt-header, dt-footer").forEach(function (el) { el.remove(); });
    };
    cleanupDistillChrome();
    if (document.body) {
      new MutationObserver(cleanupDistillChrome).observe(document.body, { childList: true });
    }
  });
</script>
<link rel="stylesheet" href="/css/distill.css" />
{{ end }}
