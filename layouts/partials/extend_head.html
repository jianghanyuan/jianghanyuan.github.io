<link rel="icon" type="image/png" href="/favicon.png" />
<link rel="apple-touch-icon" href="/favicon.png" />
<link rel="stylesheet" href="/css/custom.css" />
{{ if .Params.distill }}
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
    }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script src="https://distill.pub/template.v1.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    var cleanupDistillChrome = function () {
      document.querySelectorAll("dt-banner, dt-header, dt-footer, .logo").forEach(function (el) { el.style.display = 'none'; });
      var distillLogo = document.querySelector('svg.distill-logo');
      if (distillLogo) distillLogo.style.display = 'none';
    };
    cleanupDistillChrome();
    if (document.body) {
      new MutationObserver(cleanupDistillChrome).observe(document.body, { childList: true, subtree: true });
    }
  });
</script>
<link rel="stylesheet" href="/css/distill.css" />
{{ end }}
