baseURL: "https://jianghanyuan.github.io/"
languageCode: "en-us"
title: "Hanyuan Jiang"
theme: "PaperMod"
enableRobotsTXT: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

params:
  env: production
  title: "Hanyuan Jiang"
  description: "Understand and build general, safe, and emergent intelligence."
  author:
    name: "Hanyuan Jiang"
  defaultTheme: light
  disableThemeToggle: true
  ShowReadingTime: true
  ShowShareButtons: false
  ShowCodeCopyButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowToc: true
  ShowPageNums: false
  ShowRssButtonInSectionTermList: false
  math: false
  mainSections:
    - blog
  homeInfoParams:
    Title: "Hanyuan Jiang"
    Content: |
      My goal is to understand and harness general, emergent, and self-improving [foundation models](https://jianghanyuan.github.io/blog/research-interests/), so my [research](https://jianghanyuan.github.io/research/) focuses on developing and improving frontier reinforcement learning, LLMs, and robotic architectures. 

      I am now working with [Prof. Zhijing Jin](https://zhijing-jin.com/), hosted by UC Berkeley [CHAI](https://humancompatible.ai/) and co-affiliated with the University of Toronto.

      I currently collaborate with OpenAI on bio capability (genomics, etc) and model alignment, and previously worked on related projects with Anthropic.

      Outside of research, I hold a 7-dan rank in Go and the Candidate Master (CM) title in Chess. I occasionally share informal thoughts [here](https://jianghanyuan.github.io/vision/), which capture my thinking at a particular point in time. As always, I continue to learn and discover.
    Email: "hanyuan_jiang at hotmail dot com"
  socialIcons:
    - name: googlescholar
      url: "https://scholar.google.com/citations?user=EBG3nD0AAAAJ&hl=en"
    - name: x
      url: "https://x.com/jianghanyuan"
    - name: github
      url: "https://github.com/jianghanyuan"

menu:
  main:
    - identifier: about
      name: About
      url: /
      weight: 5
    - identifier: research
      name: Research
      url: /research/
      weight: 10
    - identifier: blog
      name: Blog
      url: /blog/
      weight: 20
    # Misc page is hidden from the nav menu but the page (content/misc.md) is
