baseURL: "https://jianghanyuan.github.io/"
languageCode: "en-us"
title: "Han Yuan Jiang"
theme: "PaperMod"
enableRobotsTXT: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

params:
  env: production
  title: "Han Yuan Jiang"
  description: "CS PhD student in computer science"
  author:
    name: "Han Yuan Jiang"
  defaultTheme: light
  disableThemeToggle: true
  ShowReadingTime: true
  ShowShareButtons: false
  ShowCodeCopyButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowToc: true
  math: false
  mainSections:
    - posts
  homeInfoParams:
    Title: "Han Yuan Jiang"
    Content: "CS PhD student in machine learning systems. I work on efficient LLM inference, distributed systems, and reliable AI deployment."
  socialIcons:
    - name: github
      url: "https://github.com/jianghanyuan"

menu:
  main:
    - identifier: profile
      name: Profile
      url: /profile/
      weight: 10
    - identifier: research
      name: Research
      url: /research/
      weight: 20
    - identifier: publications
      name: Publications
      url: /publications/
      weight: 30
    - identifier: blog
      name: Blog
      url: /posts/
      weight: 40

permalinks:
  posts: /posts/:slug/
