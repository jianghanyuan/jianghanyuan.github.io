baseURL: "https://jianghanyuan.github.io/"
languageCode: "en-us"
title: "Hanyuan Jiang"
theme: "PaperMod"
enableRobotsTXT: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

params:
  env: production
  title: "Hanyuan Jiang"
  description: "Understand and build general, safe, and emergent intelligence."
  author:
    name: "Hanyuan Jiang"
  defaultTheme: light
  disableThemeToggle: true
  ShowReadingTime: true
  ShowShareButtons: false
  ShowCodeCopyButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowToc: true
  ShowPageNums: false
  ShowRssButtonInSectionTermList: false
  math: false
  mainSections:
    - blog
  homeInfoParams:
    Title: "Hanyuan Jiang"
    Content: |
      I try to understand and contribute to general, safe, and emergent intelligence.

      My research focuses on machine learning, especially frontier deep learning and reinforcement learning architecture, as well as LLM alignment. I am also interested in game theory and mechanism design.

      Until recently, I worked on post-training and red teaming for Anthropic. I previously gained industry experience and worked on various projects at ByteDance Seed, Citadel Securities, and Huawei Research.

      I love Go and Chess. I earned a 7th Dan and Candidate Master (CM). I also love tennis, soccer, and F1.

      You can contact me at hanyuan_jiang at hotmail dot com.
  socialIcons:
    - name: googlescholar
      url: "https://scholar.google.com/citations?user=EBG3nD0AAAAJ&hl=en"
    - name: x
      url: "https://x.com/jianghanyuan"
    - name: github
      url: "https://github.com/jianghanyuan"

menu:
  main:
    - identifier: about
      name: About
      url: /
      weight: 5
    - identifier: research
      name: Research
      url: /research/
      weight: 10
    - identifier: blog
      name: Blog
      url: /blog/
      weight: 20
    - identifier: misc
      name: Misc
      url: /misc/
      weight: 30

permalinks:
  blog: /blog/:slug/
