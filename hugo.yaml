baseURL: "https://jianghanyuan.github.io/"
languageCode: "en-us"
title: "Hanyuan Jiang"
theme: "PaperMod"
enableRobotsTXT: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

params:
  env: production
  title: "Hanyuan Jiang"
  description: "CS PhD student in machine learning systems"
  author:
    name: "Hanyuan Jiang"
  defaultTheme: light
  disableThemeToggle: true
  ShowReadingTime: true
  ShowShareButtons: false
  ShowCodeCopyButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowToc: true
  ShowPageNums: false
  ShowRssButtonInSectionTermList: false
  math: false
  mainSections:
    - blog
  homeInfoParams:
    Title: "Hanyuan Jiang"
    Content: "CS PhD student in machine learning systems. I work on efficient LLM inference scheduling, training-serving co-design for scalable systems, and reliability and safety in production AI infrastructure."
  socialIcons:
    - name: googlescholar
      url: "https://scholar.google.com/citations?user=EBG3nD0AAAAJ&hl=en"
    - name: x
      url: "https://x.com/jianghanyuan"
    - name: github
      url: "https://github.com/jianghanyuan"

menu:
  main:
    - identifier: about
      name: About
      url: /
      weight: 5
    - identifier: publications
      name: Publication
      url: /research/
      weight: 10
    - identifier: blog
      name: Blog
      url: /blog/
      weight: 20
    - identifier: misc
      name: Misc
      url: /misc/
      weight: 30

permalinks:
  blog: /blog/:slug/
