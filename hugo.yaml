baseURL: "https://jianghanyuan.github.io/"
languageCode: "en-us"
title: "Han Yuan Jiang"
theme: "PaperMod"
enableRobotsTXT: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

params:
  env: production
  title: "Han Yuan Jiang"
  description: "CS PhD student in computer science"
  author:
    name: "Han Yuan Jiang"
  defaultTheme: light
  disableThemeToggle: true
  ShowReadingTime: true
  ShowShareButtons: false
  ShowCodeCopyButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowToc: true
  math: false
  mainSections:
    - posts
  homeInfoParams:
    Title: "Han Yuan Jiang"
    Content: "CS PhD student in machine learning systems focused on efficient LLM inference, systems optimization, and reliable AI deployment."
  researchInterests:
    - "Efficient LLM serving and scheduling under real-world latency constraints"
    - "Training-serving co-design for scalable model systems"
    - "Reliability, evaluation, and safety in production AI infrastructure"
  socialIcons:
    - name: github
      url: "https://github.com/jianghanyuan"

menu:
  main:
    - identifier: research
      name: Research
      url: /research/
      weight: 10
    - identifier: blog
      name: Blog
      url: /posts/
      weight: 20

permalinks:
  posts: /posts/:slug/
