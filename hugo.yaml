baseURL: "https://jianghanyuan.github.io/"
languageCode: "en-us"
title: "Hanyuan Jiang"
theme: "PaperMod"
enableRobotsTXT: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

params:
  env: production
  title: "Hanyuan Jiang"
  description: "Understand and build general, safe, and emergent intelligence."
  author:
    name: "Hanyuan Jiang"
  defaultTheme: light
  disableThemeToggle: true
  ShowReadingTime: true
  ShowShareButtons: false
  ShowCodeCopyButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowToc: true
  ShowPageNums: false
  ShowRssButtonInSectionTermList: false
  math: false
  mainSections:
    - blog
  homeInfoParams:
    Title: "Hanyuan Jiang"
    Content: |
      I try to understand and harness general, robust, and emergent intelligence.

      My research focuses on machine learning, especially frontier deep learning and reinforcement learning architecture, as well as LLM alignment. Recently, I am working on meta RL (learning to learn), LLM reasoning, and efficient training & inference (e.g., TTT). I am also interested in game theory and mechanism design.

      Until recently, I researched post-training and stress-testing with Anthropic. I also contributed to various in-house projects and collaborated with ByteDance, Qwen, and Citadel Securities.

      I love Go and Chess. I earned a 7th Dan and Candidate Master (CM). Some of my informal thoughts can be found [here](/vision/), which represent my thinking at some particular stage (though I am constantly learning, and my perspectives evolve).

      You can contact me at hanyuan_jiang at hotmail dot com.
  socialIcons:
    - name: googlescholar
      url: "https://scholar.google.com/citations?user=EBG3nD0AAAAJ&hl=en"
    - name: x
      url: "https://x.com/jianghanyuan"
    - name: github
      url: "https://github.com/jianghanyuan"

menu:
  main:
    - identifier: about
      name: About
      url: /
      weight: 5
    - identifier: research
      name: Research
      url: /research/
      weight: 10
    - identifier: blog
      name: Blog
      url: /blog/
      weight: 20
    - identifier: misc
      name: Misc
      url: /misc/
      weight: 30

permalinks:
  blog: /blog/:slug/
